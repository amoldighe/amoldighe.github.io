<!-- Footer -->

        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
                <ul class="list-inline text-center">
                    <li>
                        <a href="{{ "/feed.xml" | prepend: site.baseurl }}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-circle fa-stack-2x"></i>
                                <i class="fa fa-rss fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                    {% if site.twitter_username %}
                    <li>
                        <a href="https://twitter.com/{{ site.twitter_username }}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-circle fa-stack-2x"></i>
                                <i class="fa fa-twitter fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                    {% endif %}
                    {% if site.facebook_username %}
                    <li>
                        <a href="https://www.facebook.com/{{ site.facebook_username }}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-circle fa-stack-2x"></i>
                                <i class="fa fa-facebook fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                    {% endif %}
                    {% if site.github_username %}
                    <li>
                        <a href="https://github.com/{{ site.github_username }}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-circle fa-stack-2x"></i>
                                <i class="fa fa-github fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                    {% endif %}
                    {% if site.email_username %}
                    <li>
                        <a href="mailto:{{ site.email_username }}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-circle fa-stack-2x"></i>
                                <i class="fa fa-envelope fa-stack-1x fa-inverse"></i>
                            </span>
                        </a>
                    </li>
                    {% endif %}
                </ul>
                <p class="copyright text-muted">Copyright &copy; {{ site.copyright_name }} {{ site.time | date: '%Y' }}</p>
            </div>
        </div>
    </div>
</footer>

<script src="{{ "/js/clean-blog.min.js " | prepend: site.baseurl }}"></script>

<!-- Mermaid JS Integration -->
<script type="module">
    document.addEventListener("DOMContentLoaded", function() {
        // Select all elements matching potential mermaid blocks
        const blocks = document.querySelectorAll('div.language-mermaid, pre.language-mermaid, code.language-mermaid');
        
        // Filter out elements that are nested inside other selected mermaid containers
        const topLevelBlocks = Array.from(blocks).filter(block => {
            const parentContainer = block.parentElement.closest('div.language-mermaid, pre.language-mermaid');
            return !parentContainer;
        });

        if (topLevelBlocks.length > 0) {
            import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs').then(({ default: mermaid }) => {
                topLevelBlocks.forEach(block => {
                    let code = '';
                    const codeElement = block.querySelector('code') || (block.tagName === 'CODE' ? block : null);
                    if (codeElement) {
                        code = codeElement.innerText;
                    } else {
                        code = block.innerText;
                    }
                    
                    const mermaidDiv = document.createElement('div');
                    mermaidDiv.className = 'mermaid';
                    mermaidDiv.textContent = code.trim();
                    
                    // Replace the original block in DOM
                    block.parentNode.replaceChild(mermaidDiv, block);
                });
                
                mermaid.initialize({
                    startOnLoad: false,
                    theme: 'default',
                    securityLevel: 'loose'
                });
                mermaid.run();
            }).catch(err => {
                console.error("Failed to load Mermaid.js:", err);
            });
        }
    });
</script>
